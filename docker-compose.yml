services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pdf_vector_db
    ports:
      - "5433:5432" # We use 5433 so it doesn't clash with your existing Postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pdf_vault
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: